version: 2

models:
  - name: stg_events_checkout_success
    description: "Checkout success events with cart products unpivoted"
    columns:
      - name: event_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: order_qty
        tests:
          - not_null

  - name: stg_ip_location
    description: "IP geolocation data"
    columns:
      - name: ip
        tests:
          - not_null
          - unique

  - name: stg_products
    description: "Product data from react_data"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
